---
layout: default
---
<article class="entry">
  <h1>{{ page.title }}</h1>
  {% if page.tech %}<p><strong>Tech:</strong> {{ page.tech | join: ', ' }}</p>{% endif %}
  {% if page.links %}
  <p>
    {% for link in page.links %}
    <a href="{{ link.url }}">{{ link.name }}</a>{% unless forloop.last %} · {% endunless %}
    {% endfor %}
  </p>
  {% endif %}
  {{ content }}
</article>
