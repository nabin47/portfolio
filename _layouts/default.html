<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}" />
    {% seo %}
  </head>
  <body>
    <header class="site-header">
      <nav class="nav container">
        <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <ul>
          <li><a href="{{ '/#about' | relative_url }}">About</a></li>
          <li><a href="{{ '/#projects' | relative_url }}">Projects</a></li>
          <li><a href="{{ '/#publications' | relative_url }}">Publications</a></li>
          <li><a href="{{ '/blog/' | relative_url }}">Blog</a></li>
          <li><a href="{{ '/#experience' | relative_url }}">Experience</a></li>
        </ul>
      </nav>
    </header>

    <main class="container">{{ content }}</main>

    <footer class="site-footer container">
      <p>© {{ site.time | date: '%Y' }} {{ site.author.name }} · Built with Jekyll.</p>
    </footer>
  </body>
</html>
